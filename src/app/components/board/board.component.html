<div class="h-full flex flex-col overflow-hidden bg-slate-50">
  <!-- Board Header -->
  <header class="flex items-center justify-between px-8 py-5 bg-white border-b border-slate-100">
    <div class="flex items-center space-x-4">
      <h1 class="text-2xl font-black text-slate-800 tracking-tight">
        {{ board()?.name || 'Cargando tablero...' }}
      </h1>
      <div *ngIf="isLoading()" class="flex space-x-1.5">
        <div class="h-1.5 w-1.5 bg-red-600 rounded-full animate-bounce"></div>
        <div class="h-1.5 w-1.5 bg-red-600 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
        <div class="h-1.5 w-1.5 bg-red-600 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
      </div>
    </div>

    <div class="flex items-center space-x-3">
      <button 
        (click)="toggleAddColumn()"
        class="flex items-center px-5 py-2.5 bg-red-600 text-white rounded-xl hover:bg-red-700 transition-all duration-200 shadow-lg shadow-red-100 font-bold text-sm tracking-wide"
      >
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path>
        </svg>
        Nueva Columna
      </button>
    </div>
  </header>

  <!-- Board Content (Horizontal Scrolling) -->
  <main class="flex-1 overflow-x-auto p-8 scrollbar-thin scrollbar-thumb-slate-300 scrollbar-track-transparent">
    <div class="flex h-full space-x-8 items-start min-w-max pb-4" cdkDropListGroup>
      
      <!-- Columns -->
      <div 
        *ngFor="let column of columns()" 
        class="w-80 shrink-0 flex flex-col bg-slate-100/50 border border-slate-200 rounded-2xl overflow-hidden group/column transition-all"
      >
        <div class="p-4 flex items-center justify-between bg-white border-b border-slate-200/60">
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-red-500"></span>
            <h3 class="font-bold text-slate-700 truncate capitalize text-sm">{{ column.name }}</h3>
          </div>
          <span class="text-[10px] font-black text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">
            {{ tasksByColumn()[column.id]?.length || 0 }}
          </span>
        </div>
        
        <!-- Tasks List (Drop List) -->
        <div 
          cdkDropList
          [cdkDropListData]="tasksByColumn()[column.id]"
          (cdkDropListDropped)="drop($event, column.id)"
          class="flex-1 p-4 space-y-4 min-h-[300px]"
        >
          <!-- Task Card -->
          <div 
            *ngFor="let task of tasksByColumn()[column.id]"
            cdkDrag
            (click)="openTaskModal(task, column)"
            class="p-5 bg-white border border-slate-200 rounded-xl shadow-sm hover:border-red-200 hover:shadow-md cursor-pointer active:cursor-grabbing transition-all group/card relative overflow-hidden"
          >
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-transparent group-hover/card:bg-red-500 transition-colors"></div>
            
            <div class="flex flex-col gap-3">
              <h4 class="text-sm font-bold text-slate-800 leading-snug">
                {{ task.title }}
              </h4>
              
              <div class="flex items-center justify-between mt-1">
                <span 
                  [class]="'px-2 py-0.5 text-[10px] font-black uppercase tracking-wider border rounded-md ' + getPriorityClass(task.priority)"
                >
                  {{ task.priority }}
                </span>
              </div>
            </div>

            <!-- Drag Preview Proxy (optional, but cdk handles it) -->
            <div *cdkDragPlaceholder class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-xl h-24"></div>
          </div>

          <!-- Empty State -->
          <div *ngIf="tasksByColumn()[column.id]?.length === 0" class="p-5 bg-white/50 border border-dashed border-slate-200 rounded-xl">
            <p class="text-xs text-slate-400 font-medium italic text-center">Sin tareas pendientes</p>
          </div>
          
          <button 
            (click)="addTask(column.id)"
            class="w-full py-3 text-xs font-bold text-slate-400 hover:text-red-600 hover:bg-white rounded-xl transition-all border-2 border-dashed border-slate-200 hover:border-red-200 flex items-center justify-center gap-2 uppercase tracking-widest">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path>
            </svg>
            Añadir tarea
          </button>
        </div>
      </div>


      <!-- Add New Column Form -->
      <div 
        *ngIf="isAddingColumn()" 
        class="w-80 shrink-0 p-6 bg-white border-2 border-dashed border-red-200 rounded-2xl shadow-xl transition-all animate-in fade-in slide-in-from-right-4 duration-300"
      >
        <h4 class="text-sm font-bold text-slate-800 mb-4 px-1">Nueva Columna</h4>
        <input 
          #newColInput
          [(ngModel)]="newColumnName"
          (keyup.enter)="addColumn()"
          placeholder="Ej: En revisión..."
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-red-50 focus:border-red-500 outline-none mb-4 transition-all text-sm font-medium"
          autofocus
        />
        <div class="flex gap-2">
          <button 
            (click)="addColumn()"
            class="flex-1 px-4 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 text-xs font-bold transition-all shadow-lg shadow-red-100"
          >
            Guardar
          </button>
          <button 
            (click)="toggleAddColumn()"
            class="flex-1 px-4 py-3 bg-slate-100 text-slate-500 rounded-xl hover:bg-slate-200 text-xs font-bold transition-all"
          >
            Cancelar
          </button>
        </div>
      </div>
      
    </div>
  </main>
</div>
